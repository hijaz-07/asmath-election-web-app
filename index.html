<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
<title>Booth Setup · Invitation Only</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root{--bg1:#0f172a;--bg2:#1e293b;--card:rgba(255,255,255,.08);--card-border:rgba(255,255,255,.14);--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--accent2:#8b5cf6;--danger:#fb7185;--success:#34d399;--shadow:0 20px 60px rgba(0,0,0,.35)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:radial-gradient(circle at top left,rgba(56,189,248,.22),transparent 30%),radial-gradient(circle at bottom right,rgba(139,92,246,.2),transparent 28%),linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--text);display:grid;place-items:center;padding:24px}
.container{width:100%;max-width:560px}.card{background:var(--card);border:1px solid var(--card-border);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}.header{padding:28px 28px 18px;border-bottom:1px solid rgba(255,255,255,.08)}.header h1{font-size:clamp(1.5rem,3vw,2.2rem);line-height:1.15;margin-bottom:10px;background:linear-gradient(135deg,#fff,#cbd5e1);-webkit-background-clip:text;background-clip:text;color:transparent}.header p,.hint,.footer{color:var(--muted)}form{padding:28px;display:grid;gap:18px}.field{display:grid;gap:8px}label{font-size:.95rem;font-weight:600;color:#cbd5e1}input{width:100%;padding:14px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(15,23,42,.6);color:var(--text);outline:none;font-size:1rem;transition:.25s}input::placeholder{color:#64748b}input:focus{border-color:rgba(56,189,248,.9);box-shadow:0 0 0 4px rgba(56,189,248,.15);transform:translateY(-1px)}.error{font-size:.86rem;color:var(--danger);min-height:20px}.actions{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-top:8px;flex-wrap:wrap}.btn{border:none;border-radius:16px;padding:13px 18px;font-weight:600;cursor:pointer;transition:.25s;font-size:.98rem;background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.1);display:inline-flex;align-items:center;gap:8px;justify-content:center}.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 12px 30px rgba(56,189,248,.22);border:none}.btn-primary:hover{transform:translateY(-2px);filter:brightness(1.05)}.btn-outline{background:transparent;border:1px solid var(--card-border)}.btn-outline:hover{background:rgba(255,255,255,.08)}.status{font-size:.9rem;color:var(--success);min-height:18px}.footer{padding:0 28px 28px;font-size:.84rem;display:flex;justify-content:space-between}.resume-section{margin:0 28px 20px;padding:16px;background:rgba(56,189,248,0.1);border-radius:16px;border:1px dashed var(--accent)}@media (max-width:520px){.header,form,.footer{padding-left:18px;padding-right:18px}.resume-section{margin-left:18px;margin-right:18px}}
@media (max-width: 640px) {
  body{padding:12px}.container{max-width:100%}.card{border-radius:24px}.header h1{font-size:1.5rem}.header p{font-size:.9rem}input{padding:16px;font-size:16px}.btn{padding:16px 18px;font-size:1rem;width:100%}.actions{flex-direction:column-reverse;gap:10px}.footer{flex-direction:column;align-items:center;gap:8px;text-align:center}
}
</style>
<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
  import { 
    getAuth, 
    sendSignInLinkToEmail, 
    isSignInWithEmailLink, 
    signInWithEmailLink, 
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDlC7XS3V0TaKHY1O-_oN9ml0dNPl_OWic",
    authDomain: "asmath-election-web-app-a65b6.firebaseapp.com",
    projectId: "asmath-election-web-app-a65b6",
    storageBucket: "asmath-election-web-app-a65b6.firebasestorage.app",
    messagingSenderId: "362052846715",
    appId: "1:362052846715:web:3092bedee2f598599c0ede"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  
  // Expose everything globally
  window.db = db;
  window.auth = auth;
  window.firebaseRef = ref;
  window.firebaseGet = get;
  window.firebaseSendSignInLink = sendSignInLinkToEmail;
  window.firebaseIsSignInWithEmailLink = isSignInWithEmailLink;
  window.firebaseSignInWithEmailLink = signInWithEmailLink;
  window.firebaseOnAuthStateChanged = onAuthStateChanged;
  window.firebaseSignOut = signOut;

  // Signal that Firebase is ready
  window.firebaseReady = true;
  console.log('✅ Firebase initialized and globals set');
</script>
</head>
<body>
<div class="container"><div class="card">
  <div class="header">
    <h1>TAMIL NADU STATE ASSEMBLY ELECTION</h1>
    <p>Enter booth details and your authorised email to continue.</p>
  </div>
  <!-- Resume last session -->
  <div id="resumeSection" class="resume-section" style="display: none;">
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;">
      <span><i class="fas fa-history" style="margin-right: 8px;"></i><span id="lastBoothLabel"></span></span>
      <button class="btn btn-outline" id="resumeBtn" style="padding: 10px 16px;"><i class="fas fa-play"></i> Resume</button>
    </div>
  </div>
  <form id="boothForm" novalidate>
    <div class="field">
      <label for="assemblyName">Assembly Name</label>
      <input id="assemblyName" type="text" placeholder="e.g., Kolathur Assembly" autocomplete="off" />
      <div class="hint">Official assembly constituency name</div>
      <div class="error" id="assemblyError"></div>
    </div>
    <div class="field">
      <label for="boothNo">Booth No.</label>
      <input id="boothNo" type="number" placeholder="Booth number" min="1" step="1" />
      <div class="hint">Positive integer only</div>
      <div class="error" id="boothError"></div>
    </div>
    <div class="field">
      <label for="votersCount">Total No. of Voters</label>
      <input id="votersCount" type="number" placeholder="Total voters" min="1" step="1" />
      <div class="hint">Number of registered voters in this booth</div>
      <div class="error" id="votersError"></div>
    </div>
    <div class="field">
      <label for="editorEmail">Your Email (must be authorised)</label>
      <input id="editorEmail" type="email" placeholder="editor@example.com" autocomplete="email" />
      <div class="error" id="emailError"></div>
    </div>
    <div class="actions">
      <button class="btn btn-outline" type="button" id="resetBtn">Reset</button>
      <button class="btn btn-primary" type="submit">Send Login Link →</button>
    </div>
    <div class="status" id="statusMsg"></div>
  </form>
  <div class="footer"><span>🔒 Invitation only · Whitelisted emails</span><span>v4.0 · Email Link</span></div>
</div></div>

<script>
  // Wait for Firebase globals to be ready
  (function waitForFirebase() {
    if (!window.firebaseReady || !window.firebaseOnAuthStateChanged) {
      setTimeout(waitForFirebase, 50);
      return;
    }
    console.log('🔥 Firebase globals detected, starting app');
    
    const $ = id => document.getElementById(id);
    const f = $("boothForm");
    const a = $("assemblyName");
    const b = $("boothNo");
    const v = $("votersCount");
    const emailInput = $("editorEmail");
    const ae = $("assemblyError");
    const be = $("boothError");
    const ve = $("votersError");
    const ee = $("emailError");
    const statusMsg = $("statusMsg");
    const resumeSection = $("resumeSection");
    const lastBoothLabel = $("lastBoothLabel");
    const resumeBtn = $("resumeBtn");

    const db = window.db;
    const auth = window.auth;
    const ref = window.firebaseRef;
    const get = window.firebaseGet;
    const sendSignInLink = window.firebaseSendSignInLink;
    const isSignInWithEmailLink = window.firebaseIsSignInWithEmailLink;
    const signInWithEmailLink = window.firebaseSignInWithEmailLink;
    const onAuthStateChanged = window.firebaseOnAuthStateChanged;
    const signOut = window.firebaseSignOut;

    const STORAGE_LAST_BOOTH = 'lastBooth';
    const STORAGE_PENDING_BOOTH = 'pendingBooth';

    function loadLastBooth() {
      try {
        const saved = localStorage.getItem(STORAGE_LAST_BOOTH);
        if (saved) {
          const data = JSON.parse(saved);
          lastBoothLabel.textContent = `Last session: ${data.assemblyName}, Booth ${data.boothNo} (${data.votersCount} voters)`;
          resumeSection.style.display = 'block';
          a.value = data.assemblyName || '';
          b.value = data.boothNo || '';
          v.value = data.votersCount || '';
        }
      } catch(e) {}
    }
    loadLastBooth();

    function saveLastBooth(assembly, booth, count) {
      const data = { assemblyName: assembly, boothNo: booth, votersCount: count };
      localStorage.setItem(STORAGE_LAST_BOOTH, JSON.stringify(data));
    }

    function clearErrors() {
      [ae, be, ve, ee, statusMsg].forEach(el => el.textContent = '');
    }
    [a, b, v, emailInput].forEach(i => i.oninput = clearErrors);
    $("resetBtn").onclick = () => { f.reset(); clearErrors(); };

    resumeBtn.addEventListener('click', () => {
      const assembly = a.value.trim();
      const booth = +b.value.trim();
      const count = +v.value.trim();
      const email = emailInput.value.trim();
      if (!assembly || !booth || !count || !email) {
        alert('Please fill in all fields first.');
        return;
      }
      saveLastBooth(assembly, booth, count);
      f.dispatchEvent(new Event('submit'));
    });

    // Auth state listener
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const emailKey = user.email.replace(/\./g, ',');
        const allowedRef = ref(db, `allowedEditors/${emailKey}`);
        const snap = await get(allowedRef);
        if (snap.exists()) {
          const pending = localStorage.getItem(STORAGE_PENDING_BOOTH);
          if (pending) {
            const data = JSON.parse(pending);
            localStorage.removeItem(STORAGE_PENDING_BOOTH);
            window.location.href = `main.html?booth=${data.boothId}&mode=edit&total=${data.count}&assembly=${encodeURIComponent(data.assembly)}&boothNo=${data.booth}`;
          }
        } else {
          await signOut(auth);
          statusMsg.textContent = 'Your email is not authorised.';
        }
      }
    });

    // Handle email link return
    if (isSignInWithEmailLink(auth, window.location.href)) {
      let email = localStorage.getItem('emailForSignIn');
      if (!email) email = prompt('Please confirm your email address for verification');
      if (email) {
        signInWithEmailLink(auth, email, window.location.href)
          .then(async (result) => {
            localStorage.removeItem('emailForSignIn');
            const emailKey = result.user.email.replace(/\./g, ',');
            const allowedRef = ref(db, `allowedEditors/${emailKey}`);
            const snap = await get(allowedRef);
            if (!snap.exists()) {
              await signOut(auth);
              statusMsg.textContent = 'Your email is not authorised to edit.';
              return;
            }
            const pending = localStorage.getItem(STORAGE_PENDING_BOOTH);
            if (pending) {
              const data = JSON.parse(pending);
              localStorage.removeItem(STORAGE_PENDING_BOOTH);
              window.location.href = `main.html?booth=${data.boothId}&mode=edit&total=${data.count}&assembly=${encodeURIComponent(data.assembly)}&boothNo=${data.booth}`;
            } else {
              window.location.href = 'main.html?mode=edit';
            }
          })
          .catch(err => { statusMsg.textContent = 'Login failed: ' + err.message; });
      }
    }

    // Form submit
    f.onsubmit = async (e) => {
      e.preventDefault();
      clearErrors();
      const assembly = a.value.trim();
      const booth = +b.value.trim();
      const count = +v.value.trim();
      const email = emailInput.value.trim();
      let ok = true;

      if (!assembly) { ae.textContent = "Assembly name is required."; ok = false; }
      else if (assembly.length < 3) { ae.textContent = "Enter a valid assembly name (min 3 characters)."; ok = false; }

      if (!Number.isInteger(booth) || booth <= 0) { be.textContent = "Booth number must be a positive whole number."; ok = false; }

      if (!Number.isInteger(count) || count <= 0) { ve.textContent = "Voter count must be a positive whole number."; ok = false; }
      else if (count > 5000 && !confirm(`You entered ${count} voters. Is that correct?`)) ok = false;

      if (!email || !email.includes('@')) { ee.textContent = "Valid email is required."; ok = false; }

      if (!ok) return;

      const boothId = `${assembly.replace(/\s+/g, '-')}_${booth}`;
      const boothData = { assembly, booth, count, boothId };
      localStorage.setItem(STORAGE_PENDING_BOOTH, JSON.stringify(boothData));
      localStorage.setItem('emailForSignIn', email);
      saveLastBooth(assembly, booth, count);

      const actionCodeSettings = {
        url: window.location.href,
        handleCodeInApp: true
      };

      try {
        await sendSignInLink(auth, email, actionCodeSettings);
        statusMsg.textContent = `✅ Login link sent to ${email}. Check your inbox (and spam).`;
      } catch (err) {
        ee.textContent = err.message;
        console.error('Send link error:', err);
      }
    };
  })();
</script>
</body>
</html>
