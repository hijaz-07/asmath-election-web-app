<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Live Voter List · Invitation Only</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDlC7XS3V0TaKHY1O-_oN9ml0dNPl_OWic",
      authDomain: "asmath-election-web-app-a65b6.firebaseapp.com",
      projectId: "asmath-election-web-app-a65b6",
      storageBucket: "asmath-election-web-app-a65b6.firebasestorage.app",
      messagingSenderId: "362052846715",
      appId: "1:362052846715:web:3092bedee2f598599c0ede"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    
    window.db = db;
    window.auth = auth;
    window.firebaseRef = ref;
    window.firebaseSet = set;
    window.firebaseUpdate = update;
    window.firebaseOnValue = onValue;
    window.firebaseGet = get;
    window.firebaseSignOut = signOut;
    window.firebaseOnAuthStateChanged = onAuthStateChanged;

    console.log('✅ Firebase initialized (main)');
  </script>
  <style>
    /* ========== GLOBAL (Laptop First) ========== */
    :root {
      --bg1: #0f172a; --bg2: #1e293b; --card: rgba(255, 255, 255, 0.08); --card-border: rgba(255, 255, 255, 0.14);
      --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --accent2: #8b5cf6; --danger: #fb7185; --success: #34d399;
      --warning: #fbbf24; --shadow: 0 20px 60px rgba(0, 0, 0, 0.35); --our-highlight: #2563eb; --polled-highlight: #dc2626;
      --ourpolled-highlight: #16a34a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at top left, rgba(56,189,248,0.22), transparent 30%),
                  radial-gradient(circle at bottom right, rgba(139,92,246,0.2), transparent 28%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text); padding: 24px; display: flex; flex-direction: column; align-items: center;
    }
    .app-container { width: 100%; max-width: 1400px; }
    .glass-card {
      background: var(--card); border: 1px solid var(--card-border); backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px); border-radius: 28px; box-shadow: var(--shadow);
      padding: 24px 28px; margin-bottom: 24px;
    }
    .main-heading {
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      line-height: 1.15;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 18px;
    }
    .booth-header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; }
    .booth-info h1 {
      font-size: 1.8rem; background: linear-gradient(135deg, #fff, #cbd5e1);
      -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 6px;
    }
    .booth-meta { display: flex; gap: 24px; color: var(--muted); font-size: 1rem; }
    .booth-meta i { margin-right: 6px; color: var(--accent); }
    .action-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      border: none; border-radius: 16px; padding: 12px 20px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease; font-size: 0.95rem; background: rgba(255,255,255,0.05); color: #fff;
      border: 1px solid rgba(255,255,255,0.1); display: inline-flex; align-items: center; gap: 8px;
      backdrop-filter: blur(8px);
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 8px 20px rgba(56,189,248,0.2); border: none; }
    .btn-outline { background: transparent; border: 1px solid var(--card-border); }
    .btn-outline:hover { background: rgba(255,255,255,0.08); }
    .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(251,113,133,0.15); }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 16px; margin: 20px 0 10px; }
    .stat-card {
      background: rgba(15,23,42,0.6); border-radius: 20px; padding: 16px 12px;
      border: 1px solid rgba(255,255,255,0.06); text-align: center;
    }
    .stat-value { font-size: 2.2rem; font-weight: 700; line-height: 1.2; }
    .stat-percent { font-size: 0.9rem; font-weight: 400; margin-left: 6px; opacity: 0.8; }
    .stat-label { color: var(--muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    .stat-our { color: var(--success); } .stat-polled { color: var(--danger); } .stat-ourpolled { color: var(--success); } .stat-balance { color: var(--accent); }
    .controls-bar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
    .search-wrapper {
      display: flex; align-items: center; background: rgba(15,23,42,0.6); border-radius: 40px;
      padding: 4px 4px 4px 18px; border: 1px solid var(--card-border); flex: 1 1 50px;
    }
    .search-wrapper i { color: var(--muted); }
    .search-wrapper input {
      background: transparent; border: none; padding: 12px 12px; color: var(--text);
      font-size: 1rem; width: 100%; outline: none;
    }
    .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 16px; border-radius: 30px; background: rgba(255,255,255,0.03);
      border: 1px solid var(--card-border); color: var(--muted); cursor: pointer; font-weight: 500; transition: all 0.2s;
    }
    .filter-btn.active { background: var(--accent); color: #0f172a; border-color: var(--accent); }
    .voter-table-container {
      max-height: 600px; overflow-y: auto; border-radius: 20px; background: rgba(0,0,0,0.2);
      margin-top: 8px; scroll-behavior: smooth;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    th {
      position: sticky; top: 0; background: #1e293b; padding: 16px 12px; text-align: left;
      color: #cbd5e1; font-weight: 600; backdrop-filter: blur(10px); z-index: 2;
    }
    td { padding: 12px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    tr.voter-row { cursor: pointer; transition: background 0.15s; }
    tr.voter-row:hover { background: rgba(255,255,255,0.06) !important; }
    tr.voter-row.checked-row { outline: 2px solid var(--accent); outline-offset: -2px; background: rgba(56,189,248,0.15) !important; }
    tr.selected-row { outline: 2px solid var(--accent); outline-offset: -2px; background: rgba(56,189,248,0.15) !important; }
    .status-badge {
      display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 0.8rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .status-our { background: rgba(37,99,235,0.3); color: #bfdbfe; }
    .status-polled { background: rgba(220,38,38,0.3); color: #fecaca; }
    .status-ourpolled { background: rgba(22,163,74,0.3); color: #bbf7d0; }
    .status-none { color: var(--muted); }
    td.sl-col { font-weight: 600; transition: background 0.2s; }
    .sl-our { background-color: var(--our-highlight) !important; color: white; }
    .sl-polled { background-color: var(--polled-highlight) !important; color: white; }
    .sl-ourpolled { background-color: var(--ourpolled-highlight) !important; color: white; }
    .empty-message { text-align: center; padding: 48px; color: var(--muted); }
    .footer-note { display: flex; justify-content: space-between; margin-top: 16px; color: var(--muted); font-size: 0.85rem; }
    .readonly-badge {
      background: var(--warning); color: #0f172a; padding: 4px 12px; border-radius: 40px;
      font-weight: 600; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px; margin-left: 12px;
    }
    .connection-status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #4ade80; margin-right: 8px; box-shadow: 0 0 10px #4ade80; }

    .voter-checkbox {
      width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer;
      transform: scale(1.2); margin: 0; vertical-align: middle;
    }
    .select-all-checkbox { transform: scale(1.2); accent-color: var(--accent); cursor: pointer; }

    /* ========== MOBILE DEDICATED UI (max-width: 768px) ========== */
    @media (max-width: 768px) {
      body { padding: 12px; }
      .app-container { max-width: 100%; }
      .glass-card { padding: 18px 16px; border-radius: 24px; margin-bottom: 16px; }
      .main-heading { font-size: 1.5rem; padding-bottom: 12px; }

      .booth-header { flex-direction: column; align-items: stretch; gap: 16px; }
      .booth-info h1 { font-size: 1.5rem; }
      .booth-meta { flex-wrap: wrap; gap: 12px; font-size: 0.9rem; }
      .action-buttons { flex-direction: column; width: 100%; }
      .action-buttons .btn { width: 100%; justify-content: center; padding: 16px 12px; font-size: 1rem; }

      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card { padding: 12px 8px; }
      .stat-value { font-size: 1.6rem; }
      .stat-percent { font-size: 0.75rem; display: block; margin-left: 0; }
      .stat-label { font-size: 0.75rem; }

      .controls-bar { flex-direction: column; align-items: stretch; gap: 8px; }

      .search-wrapper {
        height: 36px;
        padding: 2px 2px 2px 10px;
        border-radius: 30px;
        align-items: center;
      }
      .search-wrapper i { font-size: 0.85rem; margin-right: 4px; }
      .search-wrapper input {
        height: 100%;
        padding: 0 6px;
        font-size: 0.9rem;
        line-height: 1;
      }

      .filter-group { justify-content: center; }
      .filter-btn { padding: 8px 12px; font-size: 0.85rem; flex: 1 0 auto; }

      .voter-actions { flex-wrap: wrap; }
      .voter-actions .btn { flex: 1 1 calc(50% - 8px); padding: 14px 8px; font-size: 0.9rem; }
      #selectedInfo { width: 100%; text-align: center; margin-left: 0 !important; margin-top: 8px; }

      .voter-table-container { max-height: 450px; }
      table { font-size: 0.85rem; }
      th, td { padding: 12px 8px; }
      th:first-child, td:first-child { padding: 8px 4px; width: 40px; }
      .voter-checkbox { transform: scale(1); }
      @media (max-width: 480px) {
        th:nth-child(4), td:nth-child(4) { display: none; }
      }

      .footer-note { flex-direction: column; align-items: center; gap: 8px; text-align: center; }
      .readonly-badge { margin-left: 0; margin-top: 8px; }
    }

    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .booth-meta { flex-direction: column; gap: 6px; }
      .filter-btn { font-size: 0.8rem; padding: 6px 10px; }
      .btn { padding: 14px 10px; }

      .search-wrapper {
        height: 32px;
        padding: 2px 2px 2px 8px;
      }
      .search-wrapper input {
        font-size: 0.85rem;
        padding: 0 4px;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Booth Header Card -->
  <div class="glass-card">
    <div class="main-heading">TAMIL NADU STATE ASSEMBLY ELECTION</div>
    <div class="booth-header">
      <div class="booth-info">
        <h1 id="displayAssembly">Tamil Nadu Assembly</h1>
        <div class="booth-meta">
          <span><i class="fas fa-map-pin"></i> Booth: <strong id="displayBooth">—</strong></span>
          <span><i class="fas fa-users"></i> Total Voters: <strong id="displayTotal">0</strong></span>
          <span id="readonlyIndicator" class="readonly-badge" style="display:none;"><i class="fas fa-lock"></i> Read‑Only</span>
          <span id="connectionIndicator"><span class="connection-status"></span> Live</span>
        </div>
      </div>
      <div class="action-buttons">
        <button class="btn btn-outline" id="backToBoothBtn"><i class="fas fa-arrow-left"></i> Change Booth</button>
        <button class="btn btn-primary" id="shareViewLinkBtn"><i class="fas fa-share-alt"></i> Share Snapshot</button>
        <button class="btn btn-outline btn-danger" id="resetAllBtn"><i class="fas fa-undo-alt"></i> Reset List</button>
        <button class="btn btn-outline" id="logoutBtn" style="display:none;"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
    <div class="stats-grid" id="statsContainer"></div>
  </div>

  <!-- Voter Table Card -->
  <div class="glass-card" id="voterCard">
    <div class="controls-bar">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search voter # or status..." autocomplete="off">
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="our">Our</button>
        <button class="filter-btn" data-filter="polled">Polled</button>
        <button class="filter-btn" data-filter="ourpolled">Our Polled</button>
        <button class="filter-btn" data-filter="none">Unmarked</button>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="voter-actions" style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;">
      <button class="btn btn-primary" id="markOurBtn"><i class="fas fa-user-check"></i> Mark Our</button>
      <button class="btn" id="markPolledBtn"><i class="fas fa-vote-yea"></i> Mark Polled</button>
      <button class="btn btn-outline" id="removeStatusBtn"><i class="fas fa-times"></i> Clear Status</button>
      <button class="btn btn-outline" id="deselectAllBtn"><i class="fas fa-ban"></i> Deselect All</button>
      <span style="margin-left: auto; color: var(--muted);" id="selectedInfo">No voter selected</span>
    </div>

    <div class="voter-table-container" id="tableWrapper">
      <table>
        <thead>
          <tr>
            <th style="width: 40px;"><input type="checkbox" class="select-all-checkbox" id="selectAllCheckbox" title="Select All"></th>
            <th>Sl. No</th>
            <th>Status</th>
            <th>Last Updated</th>
          </tr>
        </thead>
        <tbody id="voterTableBody">
          <tr><td colspan="4" class="empty-message">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="footer-note">
      <span><i class="fas fa-cloud-upload-alt"></i> Real‑time sync enabled</span>
      <span>Click row to select • Double-click to toggle 'Our'</span>
    </div>
  </div>
</div>

<script>
  (function initWhenReady() {
    if (!window.db || !window.auth) { setTimeout(initWhenReady, 50); return; }
    console.log('🚀 Starting main app');
    
    const db = window.db; const auth = window.auth;
    const ref = window.firebaseRef; const set = window.firebaseSet;
    const update = window.firebaseUpdate; const onValue = window.firebaseOnValue;
    const get = window.firebaseGet;
    const onAuthStateChanged = window.firebaseOnAuthStateChanged;
    const signOutUser = window.firebaseSignOut;

    const urlParams = new URLSearchParams(window.location.search);
    const boothId = urlParams.get('booth'); const mode = urlParams.get('mode') || 'edit';
    const totalParam = urlParams.get('total'); const assemblyParam = urlParams.get('assembly');
    const boothNoParam = urlParams.get('boothNo');

    let totalVoters = totalParam ? parseInt(totalParam) : 0;
    let boothData = { assemblyName: assemblyParam || 'Unknown', boothNo: boothNoParam || '0', votersCount: totalVoters };

    const displayAssembly = document.getElementById('displayAssembly');
    const displayBooth = document.getElementById('displayBooth');
    const displayTotal = document.getElementById('displayTotal');
    const statsContainer = document.getElementById('statsContainer');
    const tbody = document.getElementById('voterTableBody');
    const searchInput = document.getElementById('searchInput');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const selectedInfo = document.getElementById('selectedInfo');
    const readonlyIndicator = document.getElementById('readonlyIndicator');
    const connectionIndicator = document.getElementById('connectionIndicator');
    const voterCard = document.getElementById('voterCard');
    const logoutBtn = document.getElementById('logoutBtn');
    const backBtn = document.getElementById('backToBoothBtn');
    const shareViewLinkBtn = document.getElementById('shareViewLinkBtn');
    const resetAllBtn = document.getElementById('resetAllBtn');
    const markOurBtn = document.getElementById('markOurBtn');
    const markPolledBtn = document.getElementById('markPolledBtn');
    const removeStatusBtn = document.getElementById('removeStatusBtn');
    const deselectAllBtn = document.getElementById('deselectAllBtn');
    const selectAllCheckbox = document.getElementById('selectAllCheckbox');

    let voters = []; 
    let selectedIndices = new Set();
    let singleSelectedIndex = -1;
    let currentFilter = 'all'; 
    let searchTerm = '';
    let isReadOnly = (mode === 'view'); 
    let currentUser = null; 
    let dbRef = null; 
    let dataListenerUnsubscribe = null;

    displayAssembly.textContent = boothData.assemblyName;
    displayBooth.textContent = boothData.boothNo;
    displayTotal.textContent = totalVoters;

    if (!boothId && !isReadOnly) { alert('No booth specified.'); window.location.href = 'index.html'; return; }
    if (boothId) dbRef = ref(db, `booths/${boothId}`);

    // Authentication + Whitelist Check
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (!user) {
        if (!isReadOnly) window.location.href = 'index.html';
        return;
      }
      
      const emailKey = user.email.replace(/\./g, ',');
      const allowedRef = ref(db, `allowedEditors/${emailKey}`);
      const snap = await get(allowedRef);
      if (!snap.exists()) {
        await signOutUser(auth);
        alert('Your email is not authorised to edit.');
        window.location.href = 'index.html';
        return;
      }

      logoutBtn.style.display = 'inline-flex';
      if (!dataListenerUnsubscribe && dbRef) setupDataListener();
      applyReadOnlyMode();
    });

    logoutBtn.addEventListener('click', async () => {
      if (confirm('Are you sure you want to log out?')) {
        await signOutUser(auth);
        window.location.href = 'index.html';
      }
    });

    const connectedRef = ref(db, '.info/connected');
    onValue(connectedRef, (snap) => {
      connectionIndicator.innerHTML = snap.val() ? `<span class="connection-status"></span> Live` : `<span style="color: var(--danger);">⚠️ Offline</span>`;
    });

    function setupDataListener() {
      if (!dbRef) return;
      dataListenerUnsubscribe = onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
          if (data.assemblyName) boothData.assemblyName = data.assemblyName;
          if (data.boothNo) boothData.boothNo = data.boothNo;
          if (data.votersCount) totalVoters = data.votersCount;
          displayAssembly.textContent = boothData.assemblyName;
          displayBooth.textContent = boothData.boothNo;
          displayTotal.textContent = totalVoters;
          if (data.voters) {
            voters = data.voters;
            if (voters.length !== totalVoters) {
              voters = Array.from({ length: totalVoters }, (_, i) => voters[i] || { status: '', updatedAt: null });
              if (!isReadOnly && currentUser) set(ref(db, `booths/${boothId}/voters`), voters);
            }
          } else {
            voters = Array(totalVoters).fill({ status: '', updatedAt: null });
            if (!isReadOnly && currentUser) set(ref(db, `booths/${boothId}/voters`), voters);
          }
        } else {
          if (!isReadOnly && currentUser) {
            const init = { ...boothData, voters: Array(totalVoters).fill({ status: '', updatedAt: null }) };
            set(dbRef, init); voters = init.voters;
          } else voters = [];
        }
        selectedIndices.clear();
        singleSelectedIndex = -1;
        renderTable();
      }, (err) => { console.error(err); tbody.innerHTML = `<tr><td colspan="4" class="empty-message">Error: ${err.message}</td></tr>`; });
    }

    function updateVoterStatus(index, newStatus) {
      if (isReadOnly || !currentUser) return;
      const updates = {}; updates[`voters/${index}`] = { status: newStatus, updatedAt: new Date().toISOString() };
      update(dbRef, updates);
    }

    function bulkUpdateStatus(indices, newStatusResolver) {
      if (isReadOnly || !currentUser || indices.length === 0) return;
      const updates = {};
      indices.forEach(idx => {
        const cur = voters[idx].status;
        const newStatus = newStatusResolver(cur);
        updates[`voters/${idx}`] = { status: newStatus, updatedAt: new Date().toISOString() };
      });
      update(dbRef, updates);
    }

    function computeStats() {
      let our = 0, polled = 0, ourPolled = 0;
      voters.forEach(v => { if (v.status === 'our') our++; else if (v.status === 'polled') polled++; else if (v.status === 'ourpolled') ourPolled++; });
      return { our: our + ourPolled, polled: polled + ourPolled, ourPolled, ourBalance: our, totalBalance: totalVoters - (polled + ourPolled), totalVoters };
    }

    function renderStats() {
      const s = computeStats(); const p = (v) => totalVoters ? ((v/totalVoters)*100).toFixed(1)+'%' : '0.0%';
      statsContainer.innerHTML = `
        <div class="stat-card"><div class="stat-value stat-our">${s.our}<span class="stat-percent">${p(s.our)}</span></div><div class="stat-label">Our Votes</div></div>
        <div class="stat-card"><div class="stat-value stat-polled">${s.polled}<span class="stat-percent">${p(s.polled)}</span></div><div class="stat-label">Total Polled</div></div>
        <div class="stat-card"><div class="stat-value stat-ourpolled">${s.ourPolled}<span class="stat-percent">${p(s.ourPolled)}</span></div><div class="stat-label">Our Polled</div></div>
        <div class="stat-card"><div class="stat-value stat-balance">${s.ourBalance}<span class="stat-percent">${p(s.ourBalance)}</span></div><div class="stat-label">Our Balance</div></div>
        <div class="stat-card"><div class="stat-value">${s.totalBalance}<span class="stat-percent">${p(s.totalBalance)}</span></div><div class="stat-label">Total Balance</div></div>
      `;
    }

    function getFilteredVoters() {
      let filtered = voters.map((v, i) => ({ ...v, originalIndex: i }));
      if (currentFilter !== 'all') filtered = filtered.filter(v => currentFilter === 'none' ? !v.status : v.status === currentFilter);
      if (searchTerm) {
        const t = searchTerm.toLowerCase();
        filtered = filtered.filter(v => (v.originalIndex+1).toString().includes(t) || (v.status||'unmarked').toLowerCase().includes(t));
      }
      return filtered;
    }

    function renderTable() {
      if (!voters.length) { 
        tbody.innerHTML = `<tr><td colspan="4" class="empty-message">Waiting for data...</td></tr>`; 
        renderStats(); 
        return; 
      }
      const filtered = getFilteredVoters();
      if (!filtered.length) { 
        tbody.innerHTML = `<tr><td colspan="4" class="empty-message">No voters match</td></tr>`; 
      } else {
        const allFilteredIndices = filtered.map(item => item.originalIndex);
        const isAllSelected = allFilteredIndices.length > 0 && allFilteredIndices.every(idx => selectedIndices.has(idx));
        selectAllCheckbox.checked = isAllSelected;
        selectAllCheckbox.indeterminate = !isAllSelected && allFilteredIndices.some(idx => selectedIndices.has(idx));

        tbody.innerHTML = filtered.map(item => {
          const idx = item.originalIndex, s = item.status;
          const updated = item.updatedAt ? new Date(item.updatedAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '—';
          const statusClass = s ? `status-${s}` : 'status-none', statusDisplay = s ? s.toUpperCase() : '—';
          const isChecked = selectedIndices.has(idx);
          const isSingleSelected = (singleSelectedIndex === idx && selectedIndices.size === 0);
          const rowClass = isChecked ? 'voter-row checked-row' : (isSingleSelected ? 'voter-row selected-row' : 'voter-row');
          let slClass = 'sl-col'; 
          if (s === 'our') slClass += ' sl-our'; 
          else if (s === 'polled') slClass += ' sl-polled'; 
          else if (s === 'ourpolled') slClass += ' sl-ourpolled';
          return `<tr class="${rowClass}" data-index="${idx}">
            <td><input type="checkbox" class="voter-checkbox" data-index="${idx}" ${isChecked ? 'checked' : ''}></td>
            <td class="${slClass}">${idx+1}</td>
            <td><span class="status-badge ${statusClass}">${statusDisplay}</span></td>
            <td>${updated}</td>
          </tr>`;
        }).join('');
      }
      if (selectedIndices.size > 0) {
        selectedInfo.textContent = `${selectedIndices.size} voter(s) selected`;
      } else if (singleSelectedIndex !== -1) {
        selectedInfo.textContent = `Selected: Voter #${singleSelectedIndex+1} (${voters[singleSelectedIndex]?.status || 'unmarked'})`;
      } else {
        selectedInfo.textContent = 'No voter selected';
      }
      renderStats();
    }

    function applyReadOnlyMode() {
      const canEdit = !isReadOnly && currentUser;
      readonlyIndicator.style.display = isReadOnly ? 'inline-flex' : 'none';
      markOurBtn.disabled = markPolledBtn.disabled = removeStatusBtn.disabled = resetAllBtn.disabled = !canEdit;
      deselectAllBtn.disabled = !canEdit;
      selectAllCheckbox.disabled = !canEdit;
      document.querySelectorAll('.voter-checkbox').forEach(cb => cb.disabled = !canEdit);
      backBtn.textContent = isReadOnly ? 'Back to Setup' : 'Change Booth';
    }

    function getActionIndices() {
      if (selectedIndices.size > 0) return Array.from(selectedIndices);
      if (singleSelectedIndex !== -1) return [singleSelectedIndex];
      return [];
    }

    function performAction(statusResolver) {
      const indices = getActionIndices();
      if (indices.length === 0) {
        alert('Please select at least one voter (use checkboxes or click a row).');
        return;
      }
      
      const filtered = getFilteredVoters();
      const totalInView = filtered.length;
      const allSelected = (indices.length === totalInView && totalInView > 0);
      
      if (allSelected) {
        const confirmMsg = `⚠️ You are about to update ALL ${totalInView} voters in the current view.\n\nThis action cannot be undone. Continue?`;
        if (!confirm(confirmMsg)) return;
      }
      
      bulkUpdateStatus(indices, statusResolver);
      selectedIndices.clear();
      singleSelectedIndex = -1;
    }

    tbody.addEventListener('change', (e) => {
      if (e.target.classList.contains('voter-checkbox')) {
        const idx = parseInt(e.target.dataset.index);
        e.target.checked ? selectedIndices.add(idx) : selectedIndices.delete(idx);
        singleSelectedIndex = -1;
        renderTable();
      }
    });

    selectAllCheckbox.addEventListener('change', (e) => {
      const filtered = getFilteredVoters();
      if (e.target.checked) filtered.forEach(item => selectedIndices.add(item.originalIndex));
      else filtered.forEach(item => selectedIndices.delete(item.originalIndex));
      singleSelectedIndex = -1;
      renderTable();
    });

    deselectAllBtn.addEventListener('click', () => {
      selectedIndices.clear();
      singleSelectedIndex = -1;
      renderTable();
    });

    tbody.addEventListener('click', (e) => {
      if (e.target.type === 'checkbox') return;
      if (isReadOnly || !currentUser) return;
      const row = e.target.closest('tr.voter-row'); 
      if (!row) return;
      const idx = parseInt(row.dataset.index);
      if (selectedIndices.size > 0) return;
      singleSelectedIndex = idx;
      renderTable();
    });

    tbody.addEventListener('dblclick', (e) => {
      if (isReadOnly || !currentUser) return;
      const row = e.target.closest('tr.voter-row'); 
      if (!row) return;
      const idx = parseInt(row.dataset.index);
      if (selectedIndices.size > 0) return;
      const cur = voters[idx].status;
      if (cur === 'our') updateVoterStatus(idx, '');
      else if (cur === 'polled') updateVoterStatus(idx, 'ourpolled');
      else if (cur === 'ourpolled') updateVoterStatus(idx, 'polled');
      else updateVoterStatus(idx, 'our');
      singleSelectedIndex = idx;
    });

    markOurBtn.addEventListener('click', () => performAction(cur => cur === 'polled' ? 'ourpolled' : 'our'));
    markPolledBtn.addEventListener('click', () => performAction(cur => cur === 'our' ? 'ourpolled' : 'polled'));
    removeStatusBtn.addEventListener('click', () => performAction(() => ''));

    filterBtns.forEach(b => b.addEventListener('click', () => { 
      filterBtns.forEach(x => x.classList.remove('active')); 
      b.classList.add('active'); 
      currentFilter = b.dataset.filter; 
      renderTable(); 
    }));
    searchInput.addEventListener('input', e => { searchTerm = e.target.value; renderTable(); });
    
    resetAllBtn.addEventListener('click', () => { 
      if (isReadOnly || !currentUser) return; 
      if (confirm('Reset all voter statuses?')) 
        set(ref(db, `booths/${boothId}/voters`), Array(totalVoters).fill({ status: '', updatedAt: null })); 
    });
    
    shareViewLinkBtn.addEventListener('click', () => {
      const url = `${location.origin}${location.pathname}?booth=${encodeURIComponent(boothId)}&mode=view`;
      navigator.clipboard.writeText(url).then(() => alert('📋 Viewer link copied!')).catch(() => prompt('Copy:', url));
    });
    
    backBtn.addEventListener('click', () => location.href = 'index.html');
    applyReadOnlyMode();
  })();
</script>
</body>
</html>
